<html lang="en">
<head>
    <link rel="stylesheet" href="guns.css">
    <title>Yore</title>
</head>
<body>
    <div class="img">
        <img src="img/homebg.png" alt="" id="top">
    </div>
    <nav class="homenav">
        <ul>
            <li><a href="homeindex.html" class="home">Home</a></li>
            <li><a href="Aboutindex.html" class="about">About</a></li>
            <li><a href="contactindex.html" class="contact">Contact us!</a></li>
        </ul>
    </nav>
    <section>
        <input type="text" id="user" placeholder="Player ID #tag">
    </section>
    <main>
        <div class="drop1">
            <button><strong>SIDE ARMS</strong></button>
            <div class="primary">
                <div class="gallery">
                    <img src="img/Guns/classic.png" alt="Classic">
                    <div class="description">Classic</div>
                </div>
                <div class="gallery">
                    <img src="img/Guns/frenzy.png" alt="Frenzy">
                    <div class="description">Frenzy</div>
                </div>
                <div class="gallery">
                    <img src="img/Guns/ghost.png" alt="Ghost">
                    <div class="description">Ghost</div>
                </div>
                <div class="gallery">
                    <img src="img/Guns/shorty.png" alt="Shorty">
                    <div class="description">Shorty</div>
                </div>
                <div class="gallery">
                    <img src="img/Guns/sheriff.png" alt="Sheriff">
                    <div class="description">Sheriff</div>
                </div>
            </div>
        </div>

        <div class="drop2">
            <button><strong>SMGS</strong></button>
            <div class="smg">
                <div class="gallery">
                    <img src="img/Guns/stinger.png" alt="Stringer">
                    <div class="description">Stringer</div>
                </div>
                <div class="gallery">
                    <img src="img/Guns/spectre.png" alt="Spectre">
                    <div class="description">Spectre</div>
                </div>
            </div>
        </div>

        <div class="drop3">
            <button><strong>SHOTGUNS</strong></button>
            <div class="shotgun">
                <div class="gallery">
                    <img src="img/Guns/bucky.png" alt="Bucky">
                    <div class="description">Bucky</div>
                </div>
                <div class="gallery">
                    <img src="img/Guns/judge.png" alt="Judge">
                    <div class="description">Judge</div>
                </div>
            </div>
        </div>

        <div class="drop4">
            <button><strong>RIFLES</strong></button>
            <div class="rifle">
                <div class="gallery">
                    <img src="img/Guns/bulldog.png" alt="Bulldog">
                    <div class="description">Bulldog</div>
                </div>
                <div class="gallery">
                    <img src="img/Guns/guardian.png" alt="Guardian">
                    <div class="description">Guardian</div>
                </div>
                <div class="gallery">
                    <img src="img/Guns/phantom.png" alt="Phantom">
                    <div class="description">Phantom</div>
                </div>
                <div class="gallery">
                    <img src="img/Guns/vandal.png" alt="Vandal">
                    <div class="description">Vandal</div>
                </div>
            </div>
        </div>

        <div class="drop5">
            <button><strong>SNIPERS</strong></button>
            <div class="sniper">
                <div class="gallery">
                    <img src="img/Guns/marshal.png" alt="Marshal">
                    <div class="description">Marshal</div>
                </div>
                <div class="gallery">
                    <img src="img/Guns/outlaw.png" alt="Outlaw">
                    <div class="description">Outlaw</div>
                </div>
                <div class="gallery">
                    <img src="img/Guns/operator.png" alt="Operator">
                    <div class="description">Operator</div>
                </div>
            </div>
        </div>

        <div class="drop6">
            <button><strong>HEAVIES</strong></button>
            <div class="heavies">
                <div class="gallery">
                    <img src="img/Guns/ares.png" alt="Ares">
                    <div class="description">Ares</div>
                </div>
                <div class="gallery">
                    <img src="img/Guns/odin.png" alt="Odin">
                    <div class="description">Odin</div>
                </div>
